<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Suranjan Poudel technical monogram</title>
  <desc id="desc">A cream SP serif monogram on a dark engineered field with muted green construction marks.</desc>
  <defs>
    <style>
      .field { fill: #171713; }
      .cream { fill: #f0e6cc; }
      .green { stroke: #526847; }
      .frame { fill: none; stroke-width: 2; vector-effect: non-scaling-stroke; }
      .rule { fill: none; stroke-width: 1.15; opacity: 0.72; vector-effect: non-scaling-stroke; }
      .datum {
        fill: none;
        stroke-width: 1.35;
        stroke-dasharray: 11 9;
        opacity: 0.82;
        vector-effect: non-scaling-stroke;
      }
      .tick { fill: none; stroke-width: 1.4; vector-effect: non-scaling-stroke; }
      .node { fill: #526847; }
    </style>
  </defs>

  <rect width="512" height="512" class="field" />

  <g aria-hidden="true">
    <path d="M30 92V30H92" class="green frame" />
    <path d="M420 30H482V92" class="green frame" />
    <path d="M482 420V482H420" class="green frame" />
    <path d="M92 482H30V420" class="green frame" />

    <rect x="54" y="54" width="404" height="404" rx="1" class="green frame" opacity="0.88" />
    <circle cx="256" cy="256" r="160" class="green rule" opacity="0.5" />
    <path d="M256 22V490" class="green datum" />

    <path d="M52 256H96" class="green tick" />
    <path d="M416 256H460" class="green tick" />
    <path d="M54 158H70" class="green tick" opacity="0.75" />
    <path d="M442 158H458" class="green tick" opacity="0.75" />
    <path d="M54 354H70" class="green tick" opacity="0.75" />
    <path d="M442 354H458" class="green tick" opacity="0.75" />
    <circle cx="256" cy="54" r="4.2" class="node" />
    <circle cx="256" cy="458" r="4.2" class="node" />
  </g>

